<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, viewport-fit=cover" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#1E88E5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TeOdonto" />
  <meta name="application-name" content="Odontologia de Angola" />
  <meta name="description" content="Sistema Digital de Odontologia de Angola - Gestão de pacientes, triagens e agendamentos" />
  <meta name="msapplication-TileColor" content="#1E88E5" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/icon.png" />

  <title>Odontologia de Angola</title>

  <style>
    /* Splash/loading screen while JS loads */
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #1E88E5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #splash-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }
    #splash-loader .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    #splash-loader .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    #splash-loader .subtitle {
      font-size: 14px;
      opacity: 0.8;
    }
    #splash-loader .spinner {
      margin-top: 32px;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* PWA install prompt banner */
    #pwa-install-banner {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #1565C0, #1E88E5);
      color: white;
      padding: 16px 20px;
      z-index: 99999;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
      animation: slideUp 0.4s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    #pwa-install-banner .banner-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 600px;
      margin: 0 auto;
    }
    #pwa-install-banner .banner-text {
      flex: 1;
    }
    #pwa-install-banner .banner-text strong {
      display: block;
      margin-bottom: 4px;
      font-size: 16px;
    }
    #pwa-install-banner .banner-text small {
      opacity: 0.9;
      font-size: 13px;
    }
    #pwa-install-btn {
      background: white;
      color: #1E88E5;
      border: none;
      padding: 10px 24px;
      border-radius: 24px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin-left: 16px;
      white-space: nowrap;
    }
    #pwa-dismiss-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 20px;
      cursor: pointer;
      margin-left: 8px;
      padding: 4px 8px;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="splash-loader">
      <div class="logo">🦷</div>
      <div class="title">Odontologia de Angola</div>
      <div class="subtitle">Sistema Digital de Saúde Oral</div>
      <div class="spinner"></div>
    </div>
  </div>

  <script type="module" src="./src/entry-web.tsx"></script>

  <!-- PWA Install Banner -->
  <div id="pwa-install-banner">
    <div class="banner-content">
      <div class="banner-text">
        <strong>📱 Instalar TeOdonto</strong>
        <small>Acesse rapidamente sem abrir o navegador</small>
      </div>
      <button id="pwa-install-btn" onclick="installPWA()">Instalar</button>
      <button id="pwa-dismiss-btn" onclick="dismissBanner()">&times;</button>
    </div>
  </div>

  <script>
    // Service Worker Registration gerido pelo vite-plugin-pwa
    // O código anterior foi removido porque o plugin já cuida disso automaticamente

    // PWA Install Prompt
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      // Show install banner
      var banner = document.getElementById('pwa-install-banner');
      if (banner) banner.style.display = 'block';
    });

    function installPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(result) {
        if (result.outcome === 'accepted') {
          console.log('✅ PWA instalada');
        }
        deferredPrompt = null;
        dismissBanner();
      });
    }

    function dismissBanner() {
      var banner = document.getElementById('pwa-install-banner');
      if (banner) banner.style.display = 'none';
    }

    // Auto-dismiss splash once React loads
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var splash = document.getElementById('splash-loader');
        if (splash && document.getElementById('root').children.length > 1) {
          splash.style.display = 'none';
        }
      }, 3000);
    });
  </script>
</body>
</html>
