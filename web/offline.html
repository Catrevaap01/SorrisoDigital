<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - TeOdonto Angola</title>
  <style>
    body { margin: 0; background: #F5F5F5; color: #333; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: Roboto, Arial, sans-serif; }
    .offline-card { background: white; border-radius: 12px; padding: 24px; max-width: 420px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,.15); }
    .offline-card h1 { margin: 0 0 12px; color: #1E88E5; }
    .offline-card p { margin: 0 0 16px; line-height: 1.5; }
    .offline-card button { background: #1E88E5; color: white; border: none; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="offline-card">
    <h1>Sem Conexão</h1>
    <p>Você está offline, mas parte do aplicativo ainda está disponível.
      Volte a conectar-se e seus dados serão sincronizados automaticamente.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
