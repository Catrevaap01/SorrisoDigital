<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline - TeOdonto</title>
  <style>
    body { margin: 0; padding: 0; font-family: system-ui; background: linear-gradient(135deg, #1E88E5, #42A5F5); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
    .content { max-width: 400px; padding: 2rem; }
    .logo { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; }
    p { margin: 0 0 2rem; opacity: 0.9; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .retry { background: white; color: #1E88E5; border: none; padding: 12px 24px; border-radius: 24px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="content">
    <div class="logo">🦷</div>
    <h1>Modo Offline</h1>
    <p>Você está offline. Algumas funções como triagens e mensagens podem estar limitadas.</p>
    <div class="spinner"></div>
    <p style="margin-top: 1rem; font-size: 0.9rem;">Reconectando em breve...</p>
    <button class="retry" onclick="window.location.reload()">Tentar Agora</button>
  </div>
</body>
</html>
